<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#000000;
    color:#ffffff;
    display:flex;
    justify-content:center;
    min-height:100vh;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:430px;
}

.profile{
    text-align:center;
    margin-bottom:30px;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#fff;
    margin:auto;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.15);
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    margin-top:18px;
    font-size:28px;
}

.username{
    display:inline-block;
    margin-top:6px;
    color:#cccccc;
    text-decoration:none;
    transition:color .2s ease;
}

.username:hover{
    color:#ffffff;
    text-decoration:underline;
}

.bio{
    margin-top:14px;
    color:#dddddd;
    line-height:1.5;
}

.links{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.link{
    background:white;
    border-radius:18px;
    padding:18px;
    text-decoration:none;
    color:#222;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:.25s;
    font-weight:600;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.link:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.arrow{
    font-size:20px;
}

.socials{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:30px;
}

.socials a{
    width:46px;
    height:46px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-size:22px;
    box-shadow:0 6px 18px rgba(0,0,0,.1);
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#999999;
    font-size:14px;
}
</style>
</head>
